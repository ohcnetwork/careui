<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/care-ui-logo-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Care·ui</title>
    <script>
      (function () {
        var scale = { small: 0.875, default: 1, large: 1.125, larger: 1.25 };
        var saved = localStorage.getItem("careui-font-size");
        var value = scale[saved] || 1;
        if (value !== 1) {
          document.documentElement.style.setProperty("--font-size-scale", value);
        }
      })();
    </script>
  </head>
  <body>
    <div
      id="app-loading"
      style="position:fixed;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:12px;background:var(--background,#fff);z-index:9999;font-family:sans-serif"
    ></div>
    <div id="root"></div>
    <script src="/loading-screen.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
